<!DOCTYPE html>
<!-- YOU ARE THE PROBLEM — un jeu d'aventure textuel dans le navigateur
     fait pour un devoir de L2 LLCER. Pas de frameworks, pas de libs, juste du HTML,
     du CSS et du JavaScript vanilla. (Ouais j'aurais pu juste rendre un diapo mais vsy.) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOU ARE THE PROBLEM</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="logo.ico">
<!-- Anton pour les grands titres qui claquent, Courier Prime pour l'ambiance machine à écrire -->
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Anton&display=swap" rel="stylesheet">
</head>
<body data-mode="noir">

<!-- Écran titre -->
<div id="title-screen" onclick="startGame()" onkeydown="startGame()">
  <h1>
    <span class="title-you">You</span>
    <span class="title-are">are</span>
    <span class="title-the">the</span>
    <span class="title-problem">Problem</span>
  </h1>
  <div class="press">Press any key to begin</div>
  <div class="ver">v1.0</div>
  <!-- L.A. 1988 parce que c'est l'année de They Live, je suis fan de John Carpenter en vrai je crois ;) -->
  <div class="year">Los Angeles — 1988</div>
</div>

<!-- Flash blanc entre les scènes, comme un cut brutal au cinéma -->
<div id="flash"></div>

<!-- C'est ici que script.js injecte toutes les scènes -->
<div id="app"></div>

<!-- La bande-son. C'est le main theme de They Live. -->
<audio id="ost" src="ost.mp3" loop preload="auto"></audio>

<!-- Bouton musique parce que tout le monde n'a pas envie d'entendre de mettre de la musique dans le tram... -->
<button id="music-btn" onclick="toggleMusic()" title="Mute music" aria-label="Toggle music">
  <span id="music-icon">♪</span>
</button>

<!-- Bouton arbre de jeu pour voir tous les chemins possibles (je pense à vous madame vous voyez) -->
<button id="tree-btn" onclick="showTree()" title="View game tree" aria-label="View game tree">
  <span>◈</span>
</button>

<!-- Tout le gameplay est là-dedans. -->
<script src="script.js"></script>
</body>
</html>
